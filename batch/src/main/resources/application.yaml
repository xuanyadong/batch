spring:
  application:
    name: batch

# 合同批量生成配置，可通过 java -jar xxx.jar --contract.data-path=xxx 覆盖
contract:
  data-path: D:\test\batch\0310.xlsx
  template-path: D:/test/batch/Contract_Template.xlsx
  output-dir: D:/test/batch/output_contract
  output-file-name-pattern: "合同-${供方简称}-${需方简称}-${合同编号}.xls"

# 提单批量生成配置
bill-of-lading:
  data-path: D:/test/batch/0310-2.xlsx
  template-path: D:/test/batch/bill-of-lading.xlsx
  output-dir: D:/test/batch/output_bill
  output-file-name-pattern: "提单-${供方简称}-${需方简称}-${提单编号}.xls"
  # 拆单配置
  split-min: 50
  split-max: 495
  split-max-sub-count: 30

# 资金流批量生成配置
fund-flow:
  data-path: D:/test/batch/资金流数据.xlsx
  template-path: D:/test/batch/资金流模板.xlsx
  output-dir: D:/test/batch/output_fund
  output-file-name-pattern: "资金流-${合同编号}.xls"
