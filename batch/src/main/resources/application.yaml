spring:
  application:
    name: batch

# 合同批量生成配置，可通过 java -jar xxx.jar --contract.data-path=xxx 覆盖
contract:
  data-path: C:\Users\Skye ding\Desktop\batch\batch\数据模板.xlsx
  template-path: C:\Users\Skye ding\Desktop\batch\batch\Contract_Template.xlsx
  output-dir: C:\Users\Skye ding\Desktop\batch\batch\output_contract
  output-file-name-pattern: "合同-${供方简称}-${需方简称}-${合同编号}.xls"

# 提单批量生成配置
bill-of-lading:
  data-path: C:\Users\Skye ding\Desktop\batch\batch\数据模板.xlsx
  template-path: C:\Users\Skye ding\Desktop\batch\batch\bill-of-lading.xlsx
  output-dir: C:\Users\Skye ding\Desktop\batch\batch\output_bill
  output-file-name-pattern: "提单-${供方简称}-${需方简称}-${提单编号}.xls"
  # 拆单配置
  split-min: 50
  split-max: 495
  split-max-sub-count: 30

# 资金流批量生成配置
fund-flow:
  data-path: D:\test\batch\数据模板.xlsx
  output-dir: D:\test\batch\output_fund
  output-file-name: 资金流.xlsx
  # 金额列名（默认用价税合计金额；也可改为 不含税金额 / 结算金额 等）
  amount-column: 价税合计金额
  # 资金流起点公司全称列表（逗号分隔或 YAML 列表），按顺序逐个展开
  # 例：root-companies: 公司A,公司B
  # 或：
  # root-companies:
  #   - 公司A全称
  #   - 公司B全称
  root-companies: 厦门伊科东城塑料制品销售有限公司
