spring:
  application:
    name: batch

# 合同批量生成配置，可通过 java -jar xxx.jar --contract.data-path=xxx 覆盖
contract:
  data-path: C:\Users\Skye ding\Desktop\batch\batch\数据模板.xlsx
  template-path: C:\Users\Skye ding\Desktop\batch\batch\Contract_Template.xlsx
  output-dir: C:\Users\Skye ding\Desktop\batch\batch\output_contract
  output-file-name-pattern: "合同-${供方简称}-${需方简称}-${合同编号}.xls"

# 提单批量生成配置
bill-of-lading:
  data-path: C:\Users\Skye ding\Desktop\batch\batch\数据模板.xlsx
  template-path: C:\Users\Skye ding\Desktop\batch\batch\bill-of-lading.xlsx
  output-dir: C:\Users\Skye ding\Desktop\batch\batch\output_bill
  output-file-name-pattern: "提单-${供方简称}-${需方简称}-${提单编号}.xls"
  split-min: 50
  split-max: 495
  split-max-sub-count: 30

# 资金流批量生成配置
fund-flow:
  data-path: D:\test\batch\数据模板.xlsx
  output-dir: D:\test\batch\output_fund
  output-file-name: 资金流.xls
  amount-column: 价税合计金额

# 上下游数据表写入配置（追加写入目标文件）
upstream-downstream:
  data-path: D:\test\batch\数据模板.xlsx
  target-file-path: D:\test\batch\聚乙烯上下游客户260407.xlsx
  target-sheet-name: 3

# PDF OCR 扫描重命名（功能5）
pdf-rename:
  scan-dir: D:\test\batch\pdf
  recursive: false
  tesseract-exe-path: D:\Tesseract-OCR\tesseract.exe
  language: chi_sim
  dpi: 200
  max-pages: 0
  dry-run: false
  fast-mode: true
  psm: 6

# 客属表文件提取（功能6）
customer-belonging-extract:
  data-path: D:\test\batch\客属表.xlsx
  source-zip-path: D:\test\batch\客属表文件.zip
  output-dir: D:\test\batch\output_customer_extract
  company-column-name: 企业抬头

# 客属表数据提取（功能7）
customer-belonging-data-extract:
  customer-table-path: D:\test\batch\客属表.xlsx
  data-table-path: D:\test\batch\数据模板.xlsx
  output-dir: D:\test\batch\output_customer_data_extract
  company-column-name: 企业抬头
  extract-columns: 供方|需方|签约时间|产品名|规格型号|数量|单位|单价（含税）|价税合计金额|账面利润
